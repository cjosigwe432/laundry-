<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBiz OTP Auth</title>

<!-- ✅ Firebase (easy version) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

</head>

<body>

<div class="container">
    <h2>Sign Up</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>

    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- ✅ YOUR FIREBASE CONFIG -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLvK-Q4v1hZ2B-mtxZzNXs5m1tCS6LdGw",
  authDomain: "neobank-app-3ebbe.firebaseapp.com",
  projectId: "neobank-app-3ebbe",
  storageBucket: "neobank-app-3ebbe.firebasestorage.app",
  messagingSenderId: "258331631270",
  appId: "1:258331631270:web:f4eeeb8ac1e3177bb21e67",
  measurementId: "G-9VRK9ZZXYS"
};

firebase.initializeApp(firebaseConfig);
</script>

<!-- ✅ MAIN SCRIPT -->
<script>

function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    firebase.auth().createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {

        // 🔥 SEND EMAIL VERIFICATION (OTP STYLE)
        userCredential.user.sendEmailVerification();

        alert("Account created! Check your email to verify.");

    })
    .catch(error => {
        alert(error.message);
    });
}

function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCredential) => {

        const user = userCredential.user;

        if (user.emailVerified) {
            alert("Login successful ✅");
        } else {
            alert("Please verify your email first ❌");
        }

    })
    .catch(error => {
        alert(error.message);
    });
}

</script>

</body>
</html>
