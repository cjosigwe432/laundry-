<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>ProPanel</h2>
    <ul>
        <li onclick="showSection('dashboard')">Dashboard</li>
        <li onclick="showSection('customers')">Customers</li>
        <li onclick="toggleTheme()">Toggle Theme</li>
        <li onclick="logout()">Logout</li>
    </ul>
</div>

<div class="main">

<!-- LOGIN -->
<div id="loginPage" class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="content hidden">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">💰 $15,200 Revenue</div>
        <div class="card">📦 420 Orders</div>
        <div class="card">👥 210 Customers</div>
    </div>

    <canvas id="myChart"></canvas>
</div>

<!-- CUSTOMERS -->
<div id="customers" class="content hidden">
    <h1>Customers</h1>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchCustomer()">

    <table id="customerTable">
        <tr><th>Name</th><th>Email</th></tr>
        <tr><td>John Doe</td><td>john@email.com</td></tr>
        <tr><td>Jane Smith</td><td>jane@email.com</td></tr>
    </table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
